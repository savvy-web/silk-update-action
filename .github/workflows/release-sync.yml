# Post-release housekeeping for this repository:
#   1. Maintain the `v<major>` alias tag (e.g. v1) at the released commit.
#   2. Hard-reset `dev` to `main` so the next feature cycle starts clean.
# Only stable SemVer 2.0.0 releases >= 1.0.0 qualify; anything else is ignored.
# Each push is skipped when the ref is already in place, so no ref-update
# events fire for listeners when there is nothing to change.
name: Release Sync

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to process (must already exist)
        type: string
        required: true
      dry-run:
        description: Print the actions without pushing
        type: boolean
        default: true

concurrency:
  group: release-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    name: Sync major tag and dev
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync major tag and reset dev
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          DRY_RUN: ${{ inputs.dry-run || false }}
        run: |
          set -euo pipefail

          # Stable SemVer 2.0.0 only: bare MAJOR.MINOR.PATCH.
          # No leading "v", no -prerelease, no +build metadata.
          if [[ ! "$RELEASE_TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::notice::Tag '$RELEASE_TAG' is not a stable SemVer release; nothing to do."
            exit 0
          fi

          major="${BASH_REMATCH[1]}"
          if (( major < 1 )); then
            echo "::notice::Release $RELEASE_TAG is below 1.0.0 (major $major); nothing to do."
            exit 0
          fi

          alias_tag="v${major}"
          commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          git fetch --quiet origin main
          main_head="$(git rev-parse FETCH_HEAD)"

          # Resolve the commit a remote tag points at (peels annotated tags); empty if absent.
          remote_tag_commit() {
            local plain="" peeled="" sha ref
            while read -r sha ref; do
              case "$ref" in
                "refs/tags/${1}^{}") peeled="$sha" ;;
                "refs/tags/${1}") plain="$sha" ;;
              esac
            done < <(git ls-remote origin "refs/tags/${1}" "refs/tags/${1}^{}")
            printf '%s' "${peeled:-$plain}"
          }

          alias_current="$(remote_tag_commit "$alias_tag")"
          dev_current="$(git ls-remote origin refs/heads/dev | awk '{ print $1 }')"

          echo "Release $RELEASE_TAG -> $commit"
          echo "Major alias $alias_tag: ${alias_current:-<absent>} -> $commit"
          echo "Branch dev: ${dev_current:-<absent>} -> $main_head (main HEAD)"

          # Major alias: create-or-move only when it is not already at the released commit.
          if [[ "$alias_current" == "$commit" ]]; then
            echo "::notice::$alias_tag already at $commit; no tag push."
          elif [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::[dry-run] would force-push $alias_tag -> $commit"
          else
            git tag -f "$alias_tag" "$commit"
            git push --force origin "refs/tags/${alias_tag}"
            echo "::notice::Moved $alias_tag to $commit."
          fi

          # dev: hard-reset only when it is not already even with main HEAD.
          if [[ "$dev_current" == "$main_head" ]]; then
            echo "::notice::dev already at $main_head; no reset."
          elif [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::[dry-run] would force-reset dev -> $main_head"
          else
            git push --force origin "FETCH_HEAD:refs/heads/dev"
            echo "::notice::Reset dev to $main_head."
          fi
