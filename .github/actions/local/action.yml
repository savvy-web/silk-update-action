name: PNPM Config Dependency Action
description: Updates pnpm config dependencies, dev dependencies, and peer dependency ranges, creating PRs with changesets
branding:
  icon: package
  color: yellow
inputs:
  app-client-id:
    description: GitHub App client ID for authentication
    required: true
  app-private-key:
    description: GitHub App private key (PEM format)
    required: true
  skip-token-revoke:
    description: Skip token revocation in the post step (tokens expire after 1 hour anyway)
    required: false
    default: "false"
  branch:
    description: Branch name for dependency update PR
    required: false
    default: pnpm/config-deps
  config-dependencies:
    description: |
      Config dependencies to update (one per line, exact match).
      Example:
        @savvy-web/pnpm-plugin-silk
        typescript
    required: false
    default: ""
  dependencies:
    description: |
      Dependencies to update (one per line, supports globs).
      Matches against dependencies, devDependencies, and optionalDependencies
      in all workspace package.json files (peerDependencies are managed via
      peer-lock / peer-minor).
      Example:
        vitest
        @savvy-web/*
    required: false
    default: ""
  peer-lock:
    description: |
      Dependencies whose peerDependency range syncs on every version bump.
      Explicit package names only (no globs). Must also match a dependencies pattern.
      Example:
        vitest-agent-reporter
    required: false
    default: ""
  peer-minor:
    description: |
      Dependencies whose peerDependency range syncs only on minor+ version bumps.
      Explicit package names only (no globs). Must also match a dependencies pattern.
      Example:
        vitest
        @vitest/coverage-v8
    required: false
    default: ""
  update-pnpm:
    description: Update pnpm version in packageManager and devEngines fields
    required: false
    default: "true"
  upgrade-runtime-node:
    description: |
      Upgrade the Node.js entry in devEngines.runtime.
      Values: false (skip), auto (resolve latest within the existing range,
      no-op for static pins), or a semver range (e.g. ^22) to move to and add
      if missing.
    required: false
    default: "false"
  upgrade-runtime-deno:
    description: |
      Upgrade the Deno entry in devEngines.runtime.
      Values: false (skip), auto, or a semver range (e.g. ^2). See
      upgrade-runtime-node for semantics.
    required: false
    default: "false"
  upgrade-runtime-bun:
    description: |
      Upgrade the Bun entry in devEngines.runtime.
      Values: false (skip), auto, or a semver range (e.g. ^1). See
      upgrade-runtime-node for semantics.
    required: false
    default: "false"
  runtime-data:
    description: |
      Data source for runtime version resolution.
      - offline: bundled runtime-resolver cache only (no network)
      - live: fetch latest data, falling back to the bundled cache on failure
    required: false
    default: offline
  dry-run:
    description: Run without making changes (for testing)
    required: false
    default: "false"
  run:
    description: |
      Commands to run after dependency updates (one per line).
      Useful for running linting, tests, or build commands after updates.
      Example:
        pnpm lint:fix
        pnpm test
    required: false
    default: ""
  changesets:
    description: Create changesets for version management when .changeset/ directory exists
    required: false
    default: "true"
  timeout:
    description: |
      Maximum time in seconds for the main action to run before cancelling.
      Prevents the action from hanging indefinitely on slow installs or commands.
    required: false
    default: "180"
  log-level:
    description: |
      Log verbosity level.
      - auto: debug when ACTIONS_STEP_DEBUG is enabled, info otherwise
      - info: buffered outcome summaries only
      - verbose: unbuffered operation milestones
      - debug: full command output and internal state
    required: false
    default: auto
  auto-merge:
    description: |
      Enable auto-merge on the dependency update PR.
      Requires branch protection with required status checks.
      Values: merge, squash, rebase, or empty to disable.
    required: false
    default: ""
outputs:
  pr-number:
    description: Pull request number (if created or updated)
  pr-url:
    description: Pull request URL (if created or updated)
  updates-count:
    description: Number of dependencies updated
  has-changes:
    description: Whether any dependencies were updated
runs:
  using: node24
  pre: dist/pre.js
  main: dist/main.js
  post: dist/post.js
